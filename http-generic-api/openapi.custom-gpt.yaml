  /governance/resolve-context-diagnostic:
    post:
      tags:
        - governance
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: resolveContextDiagnostic
      summary: Resolve governed context diagnostic
      description: |
        Resolves business type, brand path, Brand Core documents, validation state, and execution readiness without performing a mutation. This is a native backend route in the parent OpenAI schema, so it does not require endpoint child schema overlay to pass method/path validation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveContextDiagnosticRequest"
      responses:
        "200":
          description: Governed context diagnostic result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveContextDiagnosticResponse"
        "400":
          description: Invalid diagnostic request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by governance policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Governed context resolution blocked or incomplete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Schema or resolver validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Diagnostic execution failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /jobs:
    post:
      tags:
        - jobs
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: createJob
      summary: Create an async governed execution job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreateRequest"
      responses:
        "200":
          description: Existing job returned due to idempotent deduplication
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/JobSummary"
                  - type: object
                    properties:
                      deduplicated:
                        type: boolean
        "202":
          description: Job accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSummary"
        "400":
          description: Invalid job request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
