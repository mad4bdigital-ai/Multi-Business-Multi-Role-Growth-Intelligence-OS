  /status:
    get:
      tags:
        - health
      operationId: getStatus
      summary: Public system status JSON - component health and open incidents
      description: |
        Returns live DB-backed component health (API, DB, tenant_management, identity, connector_execution, intent_resolution, observability, release_readiness), open incidents, and past 30-day incident history. Returns HTTP 503 when overall status is partial_outage or major_outage.
      responses:
        "200":
          description: System operational
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
                    enum:
                      - operational
                      - degraded
                      - partial_outage
                      - major_outage
                  status_label:
                    type: string
                  components:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  active_incidents:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  past_incidents:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  updated_at:
                    type: string
                    format: date-time
        "503":
          description: Partial or major outage detected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
  /batch:
    post:
      tags:
        - execution
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: batchDispatch
      summary: Execute up to 50 API requests in a single call (parallel or sequential)
      description: |
        Fan-out dispatcher that self-calls internal routes. Forwards Authorization and x-api-key headers. /batch sub-requests are blocked to prevent loops. parallel=true (default) executes all requests concurrently via Promise.all.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requests
              properties:
                requests:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required:
                      - method
                      - path
                    properties:
                      method:
                        type: string
                        enum:
                          - GET
                          - POST
                          - PUT
                          - PATCH
                          - DELETE
                      path:
                        type: string
                        pattern: ^/
                      body:
                        type: object
                        additionalProperties: true
                parallel:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Batch results
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - count
                  - results
                properties:
                  ok:
                    type: boolean
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        status:
                          type: integer
                        ok:
                          type: boolean
                        body:
                          type: object
                          additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /tenants/{tenant_id}:
    get:
      tags:
        - tenants
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: getTenant
      summary: Get a tenant by ID
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
