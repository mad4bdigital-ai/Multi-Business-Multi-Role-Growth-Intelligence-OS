            schema:
              type: object
              properties:
                plan_id:
                  type: string
                  format: uuid
                  description: Existing validated/approved plan. If omitted an ad-hoc plan is created.
                tenant_id:
                  type: string
                  format: uuid
                user_id:
                  type: string
                  format: uuid
                brand_key:
                  type: string
                target_key:
                  type: string
                workflow_key:
                  type: string
                intent_key:
                  type: string
                apply:
                  type: boolean
                  default: false
                post_types:
                  type: array
                  items:
                    type: string
                  default:
                    - post
                publish_status:
                  type: string
                  enum:
                    - draft
                    - publish
                    - private
                  default: draft
      responses:
        "200":
          description: Dispatch completed or queued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - ok
                  - run_id
                  - trace_id
                  - plan_id
                  - connector_type
                properties:
                  ok:
                    type: boolean
                  run_id:
                    type: string
                  trace_id:
                    type: string
                  plan_id:
                    type: string
                  connector_type:
                    type: string
                    enum:
                      - wordpress
                      - content_workflow
                  plan_status:
                    type: string
                  apply:
                    type: boolean
                  duration_ms:
                    type: integer
                  result:
                    type: object
                    additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Access denied — requires human approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /connector/dispatch/status/{run_id}:
