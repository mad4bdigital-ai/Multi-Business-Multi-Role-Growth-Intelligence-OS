  /planner/plans/{plan_id}/execute:
    post:
      tags:
        - planner
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: executePlan
      summary: Execute a validated/approved plan via the connector dispatch engine
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
        - name: apply
          in: query
          schema:
