openapi: 3.1.0
info:
  title: Hostinger API
  version: 1.1.0
  description: Expanded and hardened OpenAPI schema generated from the uploaded Hostinger
    Postman collection. Examples are preserved from the collection and common error
    responses are aligned to Postman.
servers:
- url: https://developers.hostinger.com
  description: Hostinger API base URL from Postman collection variable baseUrl
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
      description: 'Hostinger API token sent as Authorization: Bearer <token>.'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
        correlation_id:
          type: string
      required:
      - message
      - correlation_id
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        correlation_id:
          type: string
      required:
      - message
      - errors
      - correlation_id
    MessageResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
      required:
      - message
    Action:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        state:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - state
      - created_at
      - updated_at
    DomainRequest:
      type: object
      additionalProperties: false
      properties:
        domain:
          type: string
      required:
      - domain
    PostInstallScript:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - content
      - created_at
      - updated_at
    PaginationMeta:
      type: object
      additionalProperties: false
      properties:
        current_page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
      required:
      - current_page
      - per_page
      - total
    ContactProfileInput:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        surname:
          type: string
        note:
          type: string
      required:
      - email
      - name
      - surname
      - note
    DnsRecordInput:
      type: object
      additionalProperties: false
      properties:
        content:
          type: string
      required:
      - content
    DnsZoneWriteEntry:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        records:
          type: array
          items:
            $ref: '#/components/schemas/DnsRecordInput'
        type:
          type: string
        ttl:
          type: integer
      required:
      - name
      - records
      - type
      - ttl
    DnsZoneUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        zone:
          type: array
          items:
            $ref: '#/components/schemas/DnsZoneWriteEntry'
        overwrite:
          type: boolean
      required:
      - zone
      - overwrite
    PasswordUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        password:
          type: string
          minLength: 1
      required:
      - password
    Subscription:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        billing_period:
          type: integer
        billing_period_unit:
          type: string
        currency_code:
          type: string
        total_price:
          type: integer
        renewal_price:
          type: integer
        is_auto_renewed:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        next_billing_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - status
      - billing_period
      - billing_period_unit
      - currency_code
      - total_price
      - renewal_price
      - is_auto_renewed
      - created_at
      - expires_at
      - next_billing_at
    VmIpAddress:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        address:
          type: string
        ptr:
          type: string
      required:
      - id
      - address
      - ptr
    VmTemplate:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        documentation:
          type: string
      required:
      - id
      - name
      - description
      - documentation
    VpsVirtualMachineDetailed:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        firewall_group_id:
          type: integer
        subscription_id:
          type: string
        data_center_id:
          type: integer
        plan:
          type: string
        hostname:
          type: string
        state:
          type: string
        actions_lock:
          type: string
        cpus:
          type: integer
        memory:
          type: integer
        disk:
          type: integer
        bandwidth:
          type: integer
        ns1:
          type: string
        ns2:
          type: string
        ipv4:
          type: array
          items:
            $ref: '#/components/schemas/VmIpAddress'
        ipv6:
          type: array
          items:
            $ref: '#/components/schemas/VmIpAddress'
        template:
          $ref: '#/components/schemas/VmTemplate'
        created_at:
          type: string
          format: date-time
      required:
      - id
      - firewall_group_id
      - subscription_id
      - data_center_id
      - plan
      - hostname
      - state
      - actions_lock
      - cpus
      - memory
      - disk
      - bandwidth
      - ns1
      - ns2
      - ipv4
      - ipv6
      - template
      - created_at
    WhoisProfile:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        tld:
          type: string
        country:
          type: string
        entity_type:
          type: string
        whois_details:
          type: object
          additionalProperties: true
        tld_details:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - tld
      - country
      - entity_type
      - whois_details
      - tld_details
      - created_at
      - updated_at
    Subscriber:
      type: object
      additionalProperties: false
      properties:
        uuid:
          type: string
        name:
          type: string
        surname:
          type: string
        email:
          type: string
          format: email
        subscription_status:
          type: string
        subscribed_at:
          type: string
          format: date-time
        source:
          type: string
        note:
          type: string
      required:
      - uuid
      - name
      - surname
      - email
      - subscription_status
      - subscribed_at
      - source
      - note
    SubscriberPage:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Subscriber'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
    PublicKey:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
      required:
      - id
      - name
      - key
    PublicKeyPage:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PublicKey'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
    FirewallRule:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        action:
          type: string
        protocol:
          type: string
        port:
          type: string
        source:
          type: string
        source_detail:
          type: string
      required:
      - id
      - action
      - protocol
      - port
      - source
      - source_detail
    FirewallRuleInput:
      type: object
      additionalProperties: false
      properties:
        protocol:
          type: string
        port:
          type: string
        source:
          type: string
        source_detail:
          type: string
      required:
      - protocol
      - port
      - source
      - source_detail
    FirewallGroup:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        is_synced:
          type: boolean
        rules:
          type: array
          items:
            $ref: '#/components/schemas/FirewallRule'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - is_synced
      - rules
      - created_at
      - updated_at
    ProjectSegment:
      type: object
      additionalProperties: false
      properties:
        uuid:
          type: string
        name:
          type: string
        query:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - uuid
      - name
      - query
      - created_at
      - updated_at
    DomainForwarding:
      type: object
      additionalProperties: false
      properties:
        domain:
          type: string
        redirect_type:
          type: string
          enum:
          - '301'
          - '302'
        redirect_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - domain
      - redirect_type
      - redirect_url
      - created_at
      - updated_at
    ActionPage:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Action'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
  parameters:
    actionId:
      name: actionId
      in: path
      required: true
      description: (Required) Action ID
      schema:
        type: integer
    backupId:
      name: backupId
      in: path
      required: true
      description: (Required) Backup ID
      schema:
        type: integer
    domain:
      name: domain
      in: path
      required: true
      description: (Required) Domain name
      schema:
        type: string
    firewallId:
      name: firewallId
      in: path
      required: true
      description: (Required) Firewall ID
      schema:
        type: integer
    ipAddressId:
      name: ipAddressId
      in: path
      required: true
      description: (Required) IP Address ID
      schema:
        type: integer
    paymentMethodId:
      name: paymentMethodId
      in: path
      required: true
      description: (Required) Payment method ID
      schema:
        type: integer
    postInstallScriptId:
      name: postInstallScriptId
      in: path
      required: true
      description: (Required) Post-install script ID
      schema:
        type: integer
    profileUuid:
      name: profileUuid
      in: path
      required: true
      description: (Required) Profile uuid parameter
      schema:
        type: string
        format: uuid
    projectName:
      name: projectName
      in: path
      required: true
      description: (Required) Docker Compose project name using alphanumeric characters,
        dashes, and underscores only
      schema:
        type: string
    publicKeyId:
      name: publicKeyId
      in: path
      required: true
      description: (Required) Public Key ID
      schema:
        type: integer
    ruleId:
      name: ruleId
      in: path
      required: true
      description: (Required) Firewall Rule ID
      schema:
        type: integer
    segmentUuid:
      name: segmentUuid
      in: path
      required: true
      description: (Required) Segment uuid parameter
      schema:
        type: string
        format: uuid
    snapshotId:
      name: snapshotId
      in: path
      required: true
      description: (Required) Snapshot ID
      schema:
        type: integer
    subscriptionId:
      name: subscriptionId
      in: path
      required: true
      description: (Required) Subscription ID
      schema:
        type: string
    templateId:
      name: templateId
      in: path
      required: true
      description: (Required) Template ID
      schema:
        type: integer
    uuid:
      name: uuid
      in: path
      required: true
      description: (Required) UUID of the contact to delete
      schema:
        type: string
        format: uuid
    virtualMachineId:
      name: virtualMachineId
      in: path
      required: true
      description: (Required) Virtual Machine ID
      schema:
        type: integer
    whoisId:
      name: whoisId
      in: path
      required: true
      description: (Required) WHOIS ID
      schema:
        type: integer
  responses:
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
paths:
  /api/billing/v1/catalog:
    get:
      operationId: getCatalogItemList
      summary: Get catalog item list
      description: 'Retrieve catalog items available for order.


        Prices in catalog items is displayed as cents (without floating point),

        e.g: float `17.99` is displayed as integer `1799`.


        Use this endpoint to view available services and pricing before placing orders.'
      tags:
      - 'Billing: Catalog'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    category:
                      type: string
                    metadata:
                      type: object
                      additionalProperties: true
                    prices:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          currency:
                            type: string
                          price:
                            type: integer
                          first_period_price:
                            type: integer
                          period:
                            type: integer
                          period_unit:
                            type: string
                        required:
                        - id
                        - name
                        - currency
                        - price
                        - first_period_price
                        - period
                        - period_unit
                  required:
                  - id
                  - name
                  - category
                  - metadata
                  - prices
              example:
              - id: <string>
                name: <string>
                category: <string>
                metadata: {}
                prices:
                - id: <string>
                  name: <string>
                  currency: <string>
                  price: <integer>
                  first_period_price: <integer>
                  period: <integer>
                  period_unit: year
                - id: <string>
                  name: <string>
                  currency: <string>
                  price: <integer>
                  first_period_price: <integer>
                  period: <integer>
                  period_unit: year
              - id: <string>
                name: <string>
                category: <string>
                metadata: {}
                prices:
                - id: <string>
                  name: <string>
                  currency: <string>
                  price: <integer>
                  first_period_price: <integer>
                  period: <integer>
                  period_unit: day
                - id: <string>
                  name: <string>
                  currency: <string>
                  price: <integer>
                  first_period_price: <integer>
                  period: <integer>
                  period_unit: month
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - name: category
        in: query
        required: false
        description: Filter catalog items by category (This can only be one of DOMAIN,VPS)
        schema:
          type: string
        example: VPS
      - name: name
        in: query
        required: false
        description: Filter catalog items by name. Use `*` for wildcard search, e.g.
          `.COM*` to find .com domain
        schema:
          type: string
        example: <string>
  /api/billing/v1/payment-methods:
    get:
      operationId: getPaymentMethodList
      summary: Get payment method list
      description: 'Retrieve available payment methods that can be used for placing
        new orders.


        If you want to add new payment method,

        please use [hPanel](https://hpanel.hostinger.com/billing/payment-methods).


        Use this endpoint to view available payment options before creating orders.'
      tags: &id001
      - 'Billing: Payment methods'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    identifier:
                      type: string
                    payment_method:
                      type: string
                    is_default:
                      type: boolean
                    is_expired:
                      type: boolean
                    is_suspended:
                      type: boolean
                    created_at:
                      type: string
                      format: date-time
                    expires_at:
                      type: string
                      format: date-time
                  required:
                  - id
                  - name
                  - identifier
                  - payment_method
                  - is_default
                  - is_expired
                  - is_suspended
                  - created_at
                  - expires_at
              example:
              - id: <integer>
                name: <string>
                identifier: <string>
                payment_method: <string>
                is_default: <boolean>
                is_expired: <boolean>
                is_suspended: <boolean>
                created_at: <dateTime>
                expires_at: <dateTime>
              - id: <integer>
                name: <string>
                identifier: <string>
                payment_method: <string>
                is_default: <boolean>
                is_expired: <boolean>
                is_suspended: <boolean>
                created_at: <dateTime>
                expires_at: <dateTime>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/billing/v1/payment-methods/{paymentMethodId}:
    post:
      operationId: setDefaultPaymentMethod
      summary: Set default payment method
      description: 'Set the default payment method for your account.


        Use this endpoint to configure the primary payment method for future orders.'
      tags: *id001
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: <string>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/paymentMethodId'
    delete:
      operationId: deletePaymentMethod
      summary: Delete payment method
      description: 'Delete a payment method from your account.


        Use this endpoint to remove unused payment methods from user accounts.'
      tags: *id001
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: <string>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/paymentMethodId'
  /api/billing/v1/subscriptions:
    get:
      operationId: getSubscriptionList
      summary: Get subscription list
      description: 'Retrieve a list of all subscriptions associated with your account.


        Use this endpoint to monitor active services and billing status.'
      tags: &id002
      - 'Billing: Subscriptions'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
              example:
              - id: <string>
                name: <string>
                status: in_trial
                billing_period: <integer>
                billing_period_unit: <string>
                currency_code: <string>
                total_price: <integer>
                renewal_price: <integer>
                is_auto_renewed: <boolean>
                created_at: <dateTime>
                expires_at: <dateTime>
                next_billing_at: <dateTime>
              - id: <string>
                name: <string>
                status: paused
                billing_period: <integer>
                billing_period_unit: <string>
                currency_code: <string>
                total_price: <integer>
                renewal_price: <integer>
                is_auto_renewed: <boolean>
                created_at: <dateTime>
                expires_at: <dateTime>
                next_billing_at: <dateTime>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/billing/v1/subscriptions/{subscriptionId}/auto-renewal/disable:
    delete:
      operationId: disableAutoRenewal
      summary: Disable auto-renewal
      description: 'Disable auto-renewal for a subscription.


        Use this endpoint when disable auto-renewal for a subscription.'
      tags: *id002
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              example:
                id: <string>
                name: <string>
                status: not_renewing
                billing_period: <integer>
                billing_period_unit: <string>
                currency_code: <string>
                total_price: <integer>
                renewal_price: <integer>
                is_auto_renewed: <boolean>
                created_at: <dateTime>
                expires_at: <dateTime>
                next_billing_at: <dateTime>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/subscriptionId'
  /api/billing/v1/subscriptions/{subscriptionId}/auto-renewal/enable:
    patch:
      operationId: enableAutoRenewal
      summary: Enable auto-renewal
      description: 'Enable auto-renewal for a subscription.


        Use this endpoint when enable auto-renewal for a subscription.'
      tags: *id002
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              example:
                id: <string>
                name: <string>
                status: not_renewing
                billing_period: <integer>
                billing_period_unit: <string>
                currency_code: <string>
                total_price: <integer>
                renewal_price: <integer>
                is_auto_renewed: <boolean>
                created_at: <dateTime>
                expires_at: <dateTime>
                next_billing_at: <dateTime>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/subscriptionId'
  /api/dns/v1/snapshots/{domain}:
    get:
      operationId: getDnsSnapshotList
      summary: Get DNS snapshot list
      description: 'Retrieve DNS snapshots for a domain.


        Use this endpoint to view available DNS backup points for restoration.'
      tags: &id003
      - 'DNS: Snapshot'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                    reason:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                  required:
                  - id
                  - reason
                  - created_at
              example:
              - id: <integer>
                reason: <string>
                created_at: <dateTime>
              - id: <integer>
                reason: <string>
                created_at: <dateTime>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/domain'
  /api/dns/v1/snapshots/{domain}/{snapshotId}:
    get:
      operationId: getDnsSnapshot
