  /api/vps/v1/virtual-machines/{virtualMachineId}/snapshot:
    get:
      operationId: getSnapshot
      summary: Get snapshot
      description: 'Retrieve snapshot for a specified virtual machine.


        Use this endpoint to view current VPS snapshot information.'
      tags: &id023
      - 'VPS: Snapshots'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: integer
                  restore_time:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
                  expires_at:
                    type: string
                    format: date-time
                required:
                - id
                - restore_time
                - created_at
                - expires_at
              example:
                id: <integer>
                restore_time: <integer>
                created_at: <dateTime>
                expires_at: <dateTime>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/virtualMachineId'
    post:
      operationId: createSnapshot
      summary: Create snapshot
      description: "Create a snapshot of a specified virtual machine.\n\nA snapshot\
        \ captures the state and data of the virtual machine at a specific point in\
        \ time, \nallowing users to restore the virtual machine to that state if needed.\
        \ \nThis operation is useful for backup purposes, system recovery, \nand testing\
        \ changes without affecting the current state of the virtual machine.\n\n\
        **Creating new snapshot will overwrite the existing snapshot!**\n\nUse this\
        \ endpoint to capture VPS state for backup and recovery purposes."
      tags: *id023
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
              example:
                id: <integer>
                name: <string>
                state: created
                created_at: <dateTime>
                updated_at: <dateTime>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/virtualMachineId'
    delete:
      operationId: deleteSnapshot
      summary: Delete snapshot
      description: 'Delete a snapshot of a specified virtual machine.


        Use this endpoint to remove VPS snapshots.'
      tags: *id023
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
              example:
                id: <integer>
                name: <string>
                state: created
                created_at: <dateTime>
                updated_at: <dateTime>
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      parameters:
      - $ref: '#/components/parameters/virtualMachineId'
  /api/vps/v1/virtual-machines/{virtualMachineId}/snapshot/restore:
    post:
      operationId: restoreSnapshot
      summary: Restore snapshot
      description: 'Restore a specified virtual machine to a previous state using
        a snapshot.


        Restoring from a snapshot allows users to revert the virtual machine to that
        state,

        which is useful for system recovery, undoing changes, or testing.


        Use this endpoint to revert VPS instances to previous saved states.'
      tags: *id023
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
              example:
                id: <integer>
                name: <string>
                state: created
