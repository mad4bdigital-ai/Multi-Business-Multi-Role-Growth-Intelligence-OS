          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        domain:
                          type: string
                        vhost_type:
                          type: string
                        is_enabled:
                          type: boolean
                        username:
                          type: string
                        client_id:
                          type: integer
                        order_id:
                          type: integer
                        created_at:
                          type: string
                          format: date-time
                        root_directory:
                          type: string
                        parent_domain:
                          type: [string, "null"]
                      required:
                      - domain
                      - vhost_type
                      - is_enabled
                      - username
                      - client_id
                      - order_id
                      - created_at
                      - root_directory
                      - parent_domain
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      current_page:
                        type: integer
                      per_page:
                        type: integer
                      total:
                        type: integer
