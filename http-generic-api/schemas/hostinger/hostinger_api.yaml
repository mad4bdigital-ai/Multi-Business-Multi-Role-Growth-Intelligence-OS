        in: query
        required: false
        description: Filter by enabled status
        schema:
          type: boolean
        example: <boolean>
      - name: domain
        in: query
        required: false
        description: Filter by domain name (exact match)
        schema:
          type: string
        example: <string>
    post:
      operationId: createWebsite
      summary: Create website
      description: 'Create a new website for the authenticated client.


        Provide the domain name and associated order ID to create a new website.

        The datacenter_code parameter is required when creating the first website

        on a new hosting plan - this will set up and configure new hosting account

