                    - current_page
                    - per_page
                    - total
                required:
                - data
                - meta
              example:
                data:
                - domain: <string>
                  vhost_type: main
                  is_enabled: <boolean>
                  username: <string>
                  client_id: <integer>
                  order_id: <integer>
                  created_at: <dateTime>
                  root_directory: <string>
                  parent_domain: <string>
                - domain: <string>
                  vhost_type: parked
                  is_enabled: <boolean>
                  username: <string>
                  client_id: <integer>
                  order_id: <integer>
                  created_at: <dateTime>
                  root_directory: <string>
                  parent_domain: <string>
                meta:
                  current_page: <integer>
                  per_page: <integer>
                  total: <integer>
