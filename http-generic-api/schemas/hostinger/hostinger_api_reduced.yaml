openapi: 3.1.0
info:
  title: Hostinger API (Reduced Read-Only Starter)
  version: 1.0.0
  description: Reduced OpenAPI schema generated from the uploaded Hostinger Postman
    collection. This starter schema is read-first and includes only governed starter
    endpoints for subscriptions, DNS zone reads, and VPS virtual machine listing.
servers:
- url: https://developers.hostinger.com
  description: Hostinger API base URL from Postman collection variable baseUrl
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
      description: 'Hostinger API token sent as Authorization: Bearer <token>.'
  parameters:
    domain:
      name: domain
      in: path
      required: true
      description: Domain name.
      schema:
        type: string
    page:
      name: page
      in: query
      required: false
      description: Page number for paginated results.
      schema:
        type: integer
        minimum: 1
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        message:
          type: string
        correlation_id:
          type: string
      required:
      - message
    Subscription:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        billing_period:
          type: integer
        billing_period_unit:
          type: string
        currency_code:
          type: string
        total_price:
          type: integer
        renewal_price:
          type: integer
        is_auto_renewed:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        next_billing_at:
          type: string
          format: date-time
    DnsRecordValue:
      type: object
      additionalProperties: true
      properties:
        content:
          type: string
        is_disabled:
          type: boolean
      required:
      - content
    DnsZoneEntry:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        records:
          type: array
          items:
            $ref: '#/components/schemas/DnsRecordValue'
        ttl:
          type: integer
        type:
          type: string
      required:
      - name
      - records
      - type
    VpsVirtualMachine:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
        subscription_id:
          type: string
        plan:
          type: string
        hostname:
          type: string
        state:
          type: string
        created_at:
          type: string
          format: date-time
paths:
  /api/billing/v1/subscriptions:
    get:
      operationId: getSubscriptionList
      summary: Get subscription list
      description: Retrieve a list of all subscriptions associated with your account.
      tags:
      - 'Billing: Subscriptions'
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/dns/v1/zones/{domain}:
    get:
      operationId: getDnsRecords
      summary: Get DNS records
      description: Retrieve DNS zone records for a specific domain.
      tags:
      - 'DNS: Zone'
      parameters:
      - $ref: '#/components/parameters/domain'
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DnsZoneEntry'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/vps/v1/virtual-machines:
    get:
      operationId: getVirtualMachines
      summary: Get virtual machines
      description: Retrieve the list of VPS virtual machines associated with your
        account.
      tags:
      - 'VPS: Virtual machine'
      parameters:
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VpsVirtualMachine'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'