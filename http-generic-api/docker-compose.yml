services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8080
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data

volumes:
  redis_data:
  app_data:
