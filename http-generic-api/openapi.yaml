      responses:
        "200": { description: Intent resolved, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /planner/create-plan:
