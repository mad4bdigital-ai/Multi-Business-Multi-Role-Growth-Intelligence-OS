        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Planner ────────────────────────────────────────────────────────────────

  /planner/resolve-intent:
    post:
      tags: [planner]
      security: [backendBearerAuth: []]
      operationId: resolveIntent
      summary: Resolve an intent key to a task route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [intent_key]
              properties:
                intent_key: { type: string }
                tenant_id: { type: string, format: uuid }
