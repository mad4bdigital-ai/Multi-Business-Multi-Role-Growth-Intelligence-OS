        "200": { description: Plan updated, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Bootstrap Readiness ────────────────────────────────────────────────────

  /bootstrap/readiness/{tenant_id}:
    get:
      tags: [bootstrap]
      security: [backendBearerAuth: []]
      operationId: getBootstrapReadiness
      summary: Run 8 first-execution readiness checks for a tenant
      description: >
        Checks: active_tenant_context, active_membership, commercial_eligibility,
        connector_available, workspace_bootstrapped, policy_path_resolved,
        review_path_resolved, managed_assignment_ready. Falls back to legacy tables
        when new platform tables are empty.
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
        - { name: persist, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: Readiness report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, ready, overall_status, tenant_id, checks]
                properties:
                  ok: { type: boolean }
                  ready: { type: boolean }
                  overall_status: { type: string, enum: [ready, degraded, not_ready] }
                  tenant_id: { type: string }
                  checks: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /bootstrap/onboarding:
    post:
      tags: [bootstrap]
      security: [backendBearerAuth: []]
      operationId: createOnboardingState
      summary: Create or reset onboarding state for a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id]
              properties:
                tenant_id: { type: string, format: uuid }
                onboarding_template: { type: string }
                current_step: { type: string }
      responses:
        "201": { description: Onboarding state created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [bootstrap]
      security: [backendBearerAuth: []]
      operationId: listOnboardingStates
      summary: List onboarding states
      parameters:
        - { name: tenant_id, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
      responses:
        "200": { description: Onboarding states, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /bootstrap/onboarding/{tenant_id}/step:
    patch:
      tags: [bootstrap]
      security: [backendBearerAuth: []]
      operationId: advanceOnboardingStep
      summary: Advance or update the onboarding step for a tenant
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_step]
              properties:
                current_step: { type: string }
                completion_status: { type: string, enum: [in_progress, complete, skipped] }
                step_data: { type: object, additionalProperties: true }
      responses:
        "200": { description: Step advanced, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Logic Graph ────────────────────────────────────────────────────────────

  /logic-definitions:
    post:
      tags: [logic]
      security: [backendBearerAuth: []]
      operationId: createLogicDefinition
      summary: Create a logic definition node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [logic_key, logic_type]
              properties:
                logic_key: { type: string }
                logic_type: { type: string, enum: [rule, decision, policy, constraint] }
                display_name: { type: string }
                parent_logic_id: { type: string, format: uuid }
                definition_body: { type: object, additionalProperties: true }
                tenant_id: { type: string, format: uuid }
      responses:
        "201": { description: Logic definition created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [logic]
      security: [backendBearerAuth: []]
      operationId: listLogicDefinitions
      summary: List logic definitions
      parameters:
        - { name: logic_type, in: query, schema: { type: string } }
        - { name: tenant_id, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
      responses:
        "200": { description: Logic definition list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /logic-definitions/{logic_id}/children:
    get:
      tags: [logic]
      security: [backendBearerAuth: []]
      operationId: getLogicChildren
      summary: Get child logic definitions for a parent node
      parameters:
        - { name: logic_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Child nodes, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /logic-definitions/{logic_id}/status:
    patch:
      tags: [logic]
      security: [backendBearerAuth: []]
      operationId: updateLogicStatus
      summary: Update status of a logic definition
      parameters:
        - { name: logic_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [draft, active, deprecated, archived] }
      responses:
        "200": { description: Status updated, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /logic-packs:
    post:
      tags: [logic]
      security: [backendBearerAuth: []]
      operationId: createLogicPack
      summary: Create a logic pack (collection of logic definitions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pack_key, display_name]
              properties:
                pack_key: { type: string }
                display_name: { type: string }
                pack_version: { type: string }
                tenant_id: { type: string, format: uuid }
                status: { type: string, default: draft }
      responses:
        "201": { description: Logic pack created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /logic-packs/{pack_id}/attach:
    post:
      tags: [logic]
      security: [backendBearerAuth: []]
      operationId: attachLogicDefinition
      summary: Attach a logic definition to a logic pack
      parameters:
        - { name: pack_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [logic_id]
              properties:
                logic_id: { type: string, format: uuid }
                sort_order: { type: integer }
      responses:
        "201": { description: Attached, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /adaptation-records:
    post:
      tags: [logic]
      security: [backendBearerAuth: []]
      operationId: createAdaptationRecord
      summary: Create an adaptation record (proposed logic change)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [logic_id, adaptation_type, proposed_change]
              properties:
                logic_id: { type: string, format: uuid }
                adaptation_type: { type: string, enum: [override, extension, replacement] }
                proposed_change: { type: object, additionalProperties: true }
                tenant_id: { type: string, format: uuid }
                requested_by: { type: string, format: uuid }
      responses:
        "201": { description: Adaptation record created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /adaptation-records/{record_id}/approve:
    patch:
      tags: [logic]
      security: [backendBearerAuth: []]
      operationId: approveAdaptationRecord
      summary: Approve or reject an adaptation record
      parameters:
        - { name: record_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision: { type: string, enum: [approved, rejected] }
                approved_by: { type: string, format: uuid }
                notes: { type: string }
      responses:
        "200": { description: Decision recorded, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Workflow Orchestration ─────────────────────────────────────────────────

  /workflow-runs:
    post:
      tags: [workflows]
      security: [backendBearerAuth: []]
      operationId: createWorkflowRun
      summary: Start a workflow run (auto-creates approval holds when access requires review)
      description: >
        Runs the access decision engine first. If decision is REQUIRE_REVIEW or
        REQUIRE_SUPERVISOR_APPROVAL, the run starts in 'pending' status and an
        approval_hold is created. Otherwise the run starts 'running'.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkflowRunCreateRequest" }
      responses:
        "201":
          description: Workflow run created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, run_id, status]
                properties:
                  ok: { type: boolean }
                  run_id: { type: string, format: uuid }
                  status: { type: string, enum: [pending, running] }
                  decision: { type: string }
                  hold_id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /workflow-runs/{run_id}:
    get:
      tags: [workflows]
      security: [backendBearerAuth: []]
      operationId: getWorkflowRun
      summary: Get a workflow run by ID
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Workflow run, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [workflows]
      security: [backendBearerAuth: []]
      operationId: updateWorkflowRun
      summary: Update workflow run status or output
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [pending, running, completed, failed, cancelled] }
                output_payload: { type: object, additionalProperties: true }
                error_message: { type: string }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /tenants/{tenant_id}/workflow-runs:
    get:
      tags: [workflows]
      security: [backendBearerAuth: []]
      operationId: getTenantWorkflowRuns
      summary: List workflow runs for a tenant
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200": { description: Workflow run list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /workflow-runs/{run_id}/steps:
    post:
      tags: [workflows]
      security: [backendBearerAuth: []]
      operationId: createStepRun
      summary: Record a step execution within a workflow run
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step_key]
              properties:
                step_key: { type: string }
                step_order: { type: integer }
                status: { type: string, enum: [pending, running, completed, failed, skipped], default: pending }
                input_payload: { type: object, additionalProperties: true }
                output_payload: { type: object, additionalProperties: true }
      responses:
        "201": { description: Step run created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /approval-holds:
    get:
      tags: [workflows]
      security: [backendBearerAuth: []]
      operationId: listApprovalHolds
      summary: List approval holds pending human decision
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, approved, rejected, expired] } }
        - { name: hold_type, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200": { description: Approval hold list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /approval-holds/{hold_id}/decide:
    post:
      tags: [workflows]
      security: [backendBearerAuth: []]
      operationId: decideApprovalHold
      summary: Approve or reject an approval hold (resumes or fails parent workflow run)
      parameters:
        - { name: hold_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalDecisionRequest" }
      responses:
        "200":
          description: Decision recorded and parent workflow run updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, hold_id, decision, run_id]
                properties:
                  ok: { type: boolean }
                  hold_id: { type: string }
                  decision: { type: string }
                  run_id: { type: string }
                  run_status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Observability ──────────────────────────────────────────────────────────

  /telemetry/spans:
    post:
      tags: [observability]
      security: [backendBearerAuth: []]
      operationId: recordTelemetrySpan
      summary: Record a telemetry span
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TelemetrySpanRequest" }
      responses:
        "201": { description: Span recorded, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /telemetry/traces/{trace_id}:
    get:
      tags: [observability]
      security: [backendBearerAuth: []]
      operationId: getTrace
      summary: Get all spans for a trace ID
      parameters:
        - { name: trace_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Trace spans, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /usage/record:
    post:
      tags: [observability]
      security: [backendBearerAuth: []]
      operationId: recordUsage
      summary: Record usage for a meter key (upserts daily bucket)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UsageRecordRequest" }
      responses:
        "200": { description: Usage recorded, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /usage/{tenant_id}:
    get:
      tags: [observability]
      security: [backendBearerAuth: []]
      operationId: getTenantUsage
      summary: Get usage meters for a tenant
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
        - { name: meter_key, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        "200": { description: Usage records, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /quota-rules:
    post:
      tags: [observability]
      security: [backendBearerAuth: []]
      operationId: createQuotaRule
      summary: Create or upsert a quota rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [meter_key, limit_value, period]
              properties:
                meter_key: { type: string }
                limit_value: { type: number }
                period: { type: string, enum: [daily, monthly, rolling_30d] }
                plan_id: { type: string, format: uuid }
                tenant_id: { type: string, format: uuid }
                enforcement: { type: string, enum: [hard, soft], default: hard }
      responses:
        "201": { description: Quota rule created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /quota-check/{tenant_id}/{meter_key}:
    get:
      tags: [observability]
      security: [backendBearerAuth: []]
      operationId: checkQuota
      summary: Check current quota usage against applicable limit
      description: >
        Resolves the applicable quota rule in priority order: tenant override →
        plan-level rule → global rule. Returns current usage, limit, and whether
        the tenant is within quota.
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
        - { name: meter_key, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Quota check result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, within_quota]
                properties:
                  ok: { type: boolean }
                  within_quota: { type: boolean }
                  meter_key: { type: string }
                  current_usage: { type: number }
                  limit_value: { type: number }
                  period: { type: string }
                  enforcement: { type: string }
                  rule_source: { type: string, enum: [tenant_override, plan_level, global] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Security & Compliance ──────────────────────────────────────────────────

  /audit-log:
    get:
      tags: [security]
      security: [backendBearerAuth: []]
      operationId: getAuditLog
      summary: Query the immutable audit log
      description: >
        The audit log is append-only; no UPDATE or DELETE is ever issued against it.
        Use actor_id, resource_type, tenant_id, and date range to filter entries.
      parameters:
        - { name: actor_id, in: query, schema: { type: string } }
        - { name: resource_type, in: query, schema: { type: string } }
        - { name: tenant_id, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: limit, in: query, schema: { type: integer, default: 100 } }
      responses:
        "200": { description: Audit log entries, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /secret-references:
    post:
      tags: [security]
      security: [backendBearerAuth: []]
      operationId: createSecretReference
      summary: Register a secret reference (no secret values stored)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [secret_key, storage_backend]
              properties:
                secret_key: { type: string }
                storage_backend: { type: string, enum: [env_var, vault, aws_secrets_manager] }
                env_var_name: { type: string }
                tenant_id: { type: string, format: uuid }
                description: { type: string }
      responses:
        "201": { description: Secret reference created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [security]
      security: [backendBearerAuth: []]
      operationId: listSecretReferences
      summary: List secret references (metadata only, no secret values)
      parameters:
        - { name: tenant_id, in: query, schema: { type: string } }
      responses:
        "200": { description: Secret reference list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /incidents:
    post:
      tags: [security]
      security: [backendBearerAuth: []]
      operationId: createIncident
      summary: Open a security or operational incident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, severity]
              properties:
                title: { type: string }
                description: { type: string }
                severity: { type: string, enum: [low, medium, high, critical] }
                tenant_id: { type: string, format: uuid }
                reported_by: { type: string, format: uuid }
                tags: { type: array, items: { type: string } }
      responses:
        "201": { description: Incident created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [security]
      security: [backendBearerAuth: []]
      operationId: listIncidents
      summary: List incidents
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: severity, in: query, schema: { type: string } }
        - { name: tenant_id, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200": { description: Incident list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /incidents/{incident_id}/status:
    patch:
      tags: [security]
      security: [backendBearerAuth: []]
      operationId: updateIncidentStatus
      summary: Update incident status
      parameters:
        - { name: incident_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, investigating, mitigated, resolved, closed] }
                resolved_by: { type: string, format: uuid }
                resolution_notes: { type: string }
      responses:
        "200": { description: Status updated, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Developer API ──────────────────────────────────────────────────────────

  /developer-apps:
    post:
      tags: [developer-api]
      security: [backendBearerAuth: []]
      operationId: createDeveloperApp
      summary: Register a developer application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, app_name]
              properties:
                tenant_id: { type: string, format: uuid }
                app_name: { type: string }
                description: { type: string }
                allowed_origins: { type: array, items: { type: string } }
                scopes: { type: array, items: { type: string } }
      responses:
        "201": { description: App created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /tenants/{tenant_id}/developer-apps:
    get:
      tags: [developer-api]
      security: [backendBearerAuth: []]
      operationId: getTenantDeveloperApps
      summary: List developer apps for a tenant
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Developer app list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /developer-apps/{app_id}/credentials:
    post:
      tags: [developer-api]
      security: [backendBearerAuth: []]
      operationId: createApiCredential
      summary: Generate an API key for a developer app (full key returned once only)
      description: >
        Generates a key in format pk_<8-char-prefix>_<32-char-random>.
        Only the SHA-256 hash is stored. The full key is returned once in this
        response and cannot be retrieved again.
      parameters:
        - { name: app_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string }
                expires_at: { type: string, format: date-time }
                scopes: { type: array, items: { type: string } }
      responses:
        "201":
          description: API key generated (store immediately — not retrievable again)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, credential_id, api_key, key_prefix]
                properties:
                  ok: { type: boolean }
                  credential_id: { type: string, format: uuid }
                  api_key: { type: string, description: "Full key — store now, not retrievable again." }
                  key_prefix: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api-credentials/{credential_id}:
    delete:
      tags: [developer-api]
      security: [backendBearerAuth: []]
      operationId: revokeApiCredential
      summary: Revoke an API credential
      parameters:
        - { name: credential_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Credential revoked, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /webhooks:
    post:
      tags: [developer-api]
      security: [backendBearerAuth: []]
      operationId: createWebhook
      summary: Register a webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, target_url, event_types]
              properties:
                tenant_id: { type: string, format: uuid }
                target_url: { type: string, format: uri }
                event_types: { type: array, items: { type: string }, minItems: 1 }
                secret_header: { type: string }
                status: { type: string, enum: [active, paused], default: active }
      responses:
        "201": { description: Webhook created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [developer-api]
      security: [backendBearerAuth: []]
      operationId: listWebhooks
      summary: List webhooks
      parameters:
        - { name: tenant_id, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
      responses:
        "200": { description: Webhook list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /rate-limit-rules:
    post:
      tags: [developer-api]
      security: [backendBearerAuth: []]
      operationId: createRateLimitRule
      summary: Create or upsert a rate limit rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rule_key, limit_count, window_seconds]
              properties:
                rule_key: { type: string }
                limit_count: { type: integer, minimum: 1 }
                window_seconds: { type: integer, minimum: 1 }
                scope: { type: string, enum: [global, tenant, user, api_key], default: tenant }
                plan_id: { type: string, format: uuid }
      responses:
        "201": { description: Rate limit rule created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Release Readiness ──────────────────────────────────────────────────────

  /release/readiness:
    get:
      tags: [release]
      security: [backendBearerAuth: []]
      operationId: getReleaseReadiness
      summary: Run 61-check platform release readiness report
      description: >
        Checks DB connectivity, all 48 platform tables, 7 legacy tables, seed data
        integrity (plans, assistance roles, quota rules, tenants), and migration
        inventory. Returns overall pass/warn/fail with per-check detail.
        Use ?summary=true for a lightweight uptime-probe-friendly response.
        Use ?persist=true to write results to release_readiness_log.
      parameters:
        - { name: persist, in: query, schema: { type: boolean, default: false } }
        - { name: summary, in: query, schema: { type: boolean, default: false } }
      responses:
        "200":
          description: All checks passed (or warn-level issues only)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReleaseReadinessResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: One or more checks failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReleaseReadinessResponse" }

  /release/readiness-history:
    get:
      tags: [release]
      security: [backendBearerAuth: []]
      operationId: getReleaseReadinessHistory
      summary: List past readiness run summaries from release_readiness_log
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 10, maximum: 50 } }
      responses:
        "200":
          description: Run history
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, runs, count]
                properties:
                  ok: { type: boolean }
                  count: { type: integer }
                  runs:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        run_id: { type: string }
                        checked_at: { type: string, format: date-time }
                        pass_count: { type: integer }
                        fail_count: { type: integer }
                        warn_count: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /release/readiness-history/{run_id}:
    get:
      tags: [release]
      security: [backendBearerAuth: []]
      operationId: getReleaseReadinessRun
      summary: Get per-check detail for a specific readiness run
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [ok, run_id, overall, checks]
                properties:
                  ok: { type: boolean }
                  run_id: { type: string }
                  overall: { type: string, enum: [pass, warn, fail] }
                  checks:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        check_key: { type: string }
                        status: { type: string, enum: [pass, warn, fail] }
                        detail: { type: string }
                        checked_at: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /release/entity-classification:
    post:
      tags: [release]
      security: [backendBearerAuth: []]
      operationId: upsertEntityClassification
      summary: Upsert entity classification entries in data_migration_inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [entity_class, table_name]
                  properties:
                    entity_class: { type: string }
                    table_name: { type: string }
                    authority_model: { type: string, enum: [canonical, transitional, legacy] }
                    read_priority: { type: integer }
                    write_strategy: { type: string, enum: [platform_primary, legacy_primary, dual_write] }
                    migration_status: { type: string, enum: [not_started, in_progress, complete] }
                    notes: { type: string }
                - type: array
                  items:
                    type: object
                    required: [entity_class, table_name]
                    properties:
                      entity_class: { type: string }
                      table_name: { type: string }
                      authority_model: { type: string }
                      read_priority: { type: integer }
                      write_strategy: { type: string }
                      migration_status: { type: string }
                      notes: { type: string }
      responses:
        "200":
          description: Entries upserted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, written, total]
                properties:
                  ok: { type: boolean }
                  written: { type: integer }
                  total: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [release]
      security: [backendBearerAuth: []]
      operationId: listEntityClassifications
      summary: List all entity classification entries (authority model inventory)
      responses:
        "200":
          description: Entity classification list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, classifications, count]
                properties:
                  ok: { type: boolean }
                  count: { type: integer }
                  classifications:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        entity_class: { type: string }
                        table_name: { type: string }
                        authority_model: { type: string }
                        read_priority: { type: integer }
                        write_strategy: { type: string }
                        migration_status: { type: string }
                        row_count: { type: integer }
                        notes: { type: string }
                        last_checked_at: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Connector Dispatch (Sprint 09) ────────────────────────────────────────

  /connector/dispatch:
    post:
      tags: [planner]
      security: [backendBearerAuth: []]
      operationId: connectorDispatch
      summary: Dispatch a connector execution (WordPress transport or content workflow)
      description: >
        Sprint 09 bridge. Accepts either an existing plan_id or creates an ad-hoc
        execution plan from brand_key + workflow_key + tenant_id, then dispatches
        immediately. Use apply=false (default) for dry-run preview.
        WordPress connector resolves brand credentials and calls runWordpressConnectorMigration.
        Content workflows queue async dispatch and return a run_id to poll.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_id: { type: string, format: uuid, description: "Existing validated/approved plan. If omitted an ad-hoc plan is created." }
                tenant_id: { type: string, format: uuid }
                user_id: { type: string, format: uuid }
                brand_key: { type: string }
                target_key: { type: string }
                workflow_key: { type: string }
                intent_key: { type: string }
                apply: { type: boolean, default: false }
                post_types: { type: array, items: { type: string }, default: ["post"] }
                publish_status: { type: string, enum: [draft, publish, private], default: draft }
      responses:
        "200":
          description: Dispatch completed or queued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, run_id, trace_id, plan_id, connector_type]
                properties:
                  ok: { type: boolean }
                  run_id: { type: string }
                  trace_id: { type: string }
                  plan_id: { type: string }
                  connector_type: { type: string, enum: [wordpress, content_workflow] }
                  plan_status: { type: string }
                  apply: { type: boolean }
                  duration_ms: { type: integer }
                  result: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Access denied — requires human approval, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /connector/dispatch/status/{run_id}:
    get:
      tags: [planner]
      security: [backendBearerAuth: []]
      operationId: getConnectorDispatchStatus
      summary: Poll connector dispatch status by workflow run ID
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Run status with steps, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /connector/history:
    get:
      tags: [planner]
      security: [backendBearerAuth: []]
      operationId: getConnectorHistory
      summary: List recent connector dispatches for a tenant
      parameters:
        - { name: tenant_id, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        "200": { description: Dispatch history, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /planner/plans/{plan_id}/execute:
    post:
      tags: [planner]
      security: [backendBearerAuth: []]
      operationId: executePlan
      summary: Execute a validated/approved plan via the connector dispatch engine
      parameters:
        - { name: plan_id, in: path, required: true, schema: { type: string } }
        - { name: apply, in: query, schema: { type: boolean, default: false } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                apply: { type: boolean, default: false }
                post_types: { type: array, items: { type: string } }
                publish_status: { type: string, enum: [draft, publish, private], default: draft }
                actor_id: { type: string, format: uuid }
      responses:
