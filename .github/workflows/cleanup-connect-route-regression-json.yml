{"name":"Cleanup Connect Route Regression JSON","on":{"push":{"branches":["main"],"paths":[".github/workflows/cleanup-connect-route-regression-json.yml"]},"workflow_dispatch":{}},"permissions":{"contents":"write"},"jobs":{"cleanup-and-patch":{"runs-on":"ubuntu-latest","steps":[{"uses":"actions/checkout@v4","with":{"persist-credentials":true}},{"name":"Patch source, test, and cleanup temporary workflows","run":"python -c 'exec(\"from pathlib import Path\\nonboarding = \\\"\\\"\\\"import { Router } from \\\"express\\\";\\n\\n/**\\n * Legacy onboarding routes are intentionally empty.\\n *\\n * `/connect` is owned by connectRoutes.js. Keeping a second `/connect`\\n * handler here can shadow the tenant connector UI when route registration\\n * order changes or production revisions drift.\\n */\\nexport function buildOnboardingRoutes() {\\n  return Router();\\n}\\n\\\"\\\"\\\"\\nPath(\\\"http-generic-api/routes/onboardingRoutes.js\\\").write_text(onboarding, encoding=\\\"utf-8\\\")\\n\\ntest_path = Path(\\\"http-generic-api/test-connect-routes.mjs\\\")\\ntext = test_path.read_text(encoding=\\\"utf-8\\\")\\nconnect_import = \\\"import { buildConnectRoutes } from \\\\\\\\\\\"./routes/connectRoutes.js\\\\\\\\\\\";\\\"\\nonboarding_import = \\\"import { buildOnboardingRoutes } from \\\\\\\\\\\"./routes/onboardingRoutes.js\\\\\\\\\\\";\\\"\\nif onboarding_import not in text:\\n    if connect_import not in text:\\n        raise SystemExit(\\\"connect route import anchor not found\\\")\\n    text = text.replace(connect_import, connect_import + \\\" \\\" + onboarding_import, 1)\\n\\nmount_anchor = \\\"app.use(buildConnectRoutes({ requireBackendApiKey: (_req, _res, next) => next(), }));\\\"\\nmount_replacement = \\\"app.use(buildOnboardingRoutes({})); app.use(buildConnectRoutes({ requireBackendApiKey: (_req, _res, next) => next(), }));\\\"\\nif \\\"app.use(buildOnboardingRoutes({}));\\\" not in text:\\n    if mount_anchor not in text:\\n        raise SystemExit(\\\"connect route mount anchor not found\\\")\\n    text = text.replace(mount_anchor, mount_replacement, 1)\\n\\nassert_anchor = \\\"assert(\\\\\\\\\\\"connect shell includes exact OAuth app name\\\\\\\\\\\", html.includes(\\\\\\\\\\\"Growth Intelligence Platform\\\\\\\\\\\"));\\\"\\nassert_replacement = \\\"assert(\\\\\\\\\\\"connect shell includes exact OAuth app name\\\\\\\\\\\", html.includes(\\\\\\\\\\\"Growth Intelligence Platform\\\\\\\\\\\")); assert(\\\\\\\\\\\"connect shell is not legacy onboarding page\\\\\\\\\\\", !html.includes(\\\\\\\\\\\"Mad4B Connector Setup\\\\\\\\\\\"));\\\"\\nif \\\"connect shell is not legacy onboarding page\\\" not in text:\\n    if assert_anchor not in text:\\n        raise SystemExit(\\\"connect route assertion anchor not found\\\")\\n    text = text.replace(assert_anchor, assert_replacement, 1)\\n\\nrequired = [onboarding_import, \\\"app.use(buildOnboardingRoutes({}));\\\", \\\"connect shell is not legacy onboarding page\\\"]\\nfor item in required:\\n    if item not in text:\\n        raise SystemExit(\\\"required patch missing: \\\" + item)\\ntest_path.write_text(text, encoding=\\\"utf-8\\\")\\n\\nfor stale in [\\n    \\\".github/workflows/add-connect-route-shadow-regression.yml\\\",\\n    \\\".github/workflows/add-connect-route-shadow-regression-strict.yml\\\",\\n    \\\".github/workflows/cleanup-connect-route-regression-final.yml\\\",\\n    \\\".github/workflows/cleanup-connect-route-regression-valid.yml\\\",\\n    \\\".github/workflows/cleanup-connect-route-regression-json.yml\\\",\\n]:\\n    Path(stale).unlink(missing_ok=True)\")' && git config user.name mad4b-platform-bot && git config user.email platform-bot@mad4b.com && git add -A .github/workflows http-generic-api/routes/onboardingRoutes.js http-generic-api/test-connect-routes.mjs && git diff --cached --check && git commit -m \"fix(auth): remove legacy connect onboarding shadow\" && git push"}]}}}