name: CI

on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate canonical source structure
        run: node validate-canonical-sources.mjs
      - name: Check canonical generated output
        run: node build-canonicals.mjs --check
      - name: Check canonical domain finder
        run: node --check find-canonical-domain.mjs
      - name: Validate memory schema refs
        run: node validate-memory-schema.mjs
      - name: Check git diff hygiene
        run: git diff --check
      - name: Check all JS modules
        working-directory: http-generic-api
        run: |
          set -e
          for f in *.js *.mjs wordpress/*.js; do
            node --check "$f"
          done

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: http-generic-api/package-lock.json
      - name: Install dependencies
        working-directory: http-generic-api
        run: npm ci
      - name: Run tests
        working-directory: http-generic-api
        run: npm test

  execution-resolver-gate:
    name: Execution Resolver Gate
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Typecheck execution resolver sources
        run: npm run typecheck
      - name: Run execution resolver unit tests
        run: npm test -- --runInBand
      - name: Guard resolver runtime surface
        run: |
          set -e
          test -f src/services/execution/dispatchPlanStep.ts
          test -f src/services/connectors/execution/resolveConnectorExecutor.ts
          test -f src/store/registries/connectorExecutorRegistry.ts
          grep -R "resolveConnectorExecutor" src/services/execution src/services/connectors/execution tests/unit
          grep -R "approval_required" src/store/registries src/services/connectors/execution tests/unit

  architecture-drift:
    name: Architecture Drift Detection
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: http-generic-api/package-lock.json
      - name: Install dependencies
        working-directory: http-generic-api
        run: npm ci
      - name: Run canonical architecture validation
        working-directory: http-generic-api
        run: npm run validate
      - name: Check legacy execution snapshot isolation
        working-directory: http-generic-api
        run: |
          set -e
          if grep -RInE 'from .*/execution(\.js)?|import\(.*/execution(\.js)?|require\(.*/execution(\.js)?' . --include='*.js' --include='*.mjs' --exclude='execution.js' --exclude='validate-architecture.mjs' --exclude='test-*.mjs' --exclude='fix-*.mjs' --exclude='extract-modules.js'; then
            echo "DRIFT: execution.js is marked snapshot_archived but is imported by runtime code"
            exit 1
          fi
      - name: Check server.js line count
        working-directory: http-generic-api
        run: |
          set -e
          LINES=$(wc -l < server.js)
          echo "server.js: ${LINES} lines"
          test "$LINES" -le 6000
      - name: Check wordpress barrel export floor
        working-directory: http-generic-api
        run: |
          set -e
          node -e "import('./wordpress/index.js').then(m => { const n = Object.keys(m).length; console.log('wordpress/index.js exports:', n); if (n < 545) process.exit(1); })"
