name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-validate:
    name: Test & Architecture Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: http-generic-api/package-lock.json

      - name: Install dependencies
        working-directory: http-generic-api
        run: npm ci

      - name: Syntax check all modules
        working-directory: http-generic-api
        run: |
          for f in *.js wordpress/*.js; do
            node --check "$f" || { echo "SYNTAX ERROR: $f"; exit 1; }
          done

      - name: Run unit + integration tests
        working-directory: http-generic-api
        run: npm test

      - name: Run architecture validation
        working-directory: http-generic-api
        run: npm run validate
