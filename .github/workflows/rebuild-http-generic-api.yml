name: Rebuild HTTP Generic API Cloud Run

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Google Cloud project ID. Defaults to repo variable GCP_PROJECT_ID."
        required: false
        default: ""
        type: string
      service:
        description: "Cloud Run service name"
        required: false
        default: "http-generic-api"
        type: string
      region:
        description: "Cloud Run region"
        required: false
        default: "europe-west1"
        type: string
      verify_paths:
        description: "Run post-deploy smoke tests"
        required: false
        default: "true"
        type: string
  push:
    paths:
      - ".github/ops/rebuild-http-generic-api.txt"
      - ".github/workflows/rebuild-http-generic-api.yml"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ inputs.project_id || vars.GCP_PROJECT_ID }}
  SERVICE: ${{ inputs.service || 'http-generic-api' }}
  REGION: ${{ inputs.region || 'europe-west1' }}
  VERIFY_PATHS: ${{ inputs.verify_paths || 'true' }}

jobs:
  rebuild:
    name: Rebuild and deploy Cloud Run service
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy config
        env:
          WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          test -n "$PROJECT_ID" || (echo "Missing project_id input or GCP_PROJECT_ID repo variable." >&2; exit 1)
          test -n "$WIF_PROVIDER" || (echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER repo variable." >&2; exit 1)
          test -n "$DEPLOYER_SERVICE_ACCOUNT" || (echo "Missing GCP_DEPLOYER_SERVICE_ACCOUNT repo variable." >&2; exit 1)
          echo "Project: $PROJECT_ID"
          echo "Service: $SERVICE"
          echo "Region: $REGION"

      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Rebuild and deploy from source
        id: deploy
        run: |
          set -euo pipefail
          gcloud config set project "$PROJECT_ID" --quiet
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --source "http-generic-api" \
            --quiet

          REVISION="$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format 'value(status.latestReadyRevisionName)')"
          URL="$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format 'value(status.url)')"
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Latest ready revision: $REVISION"
          echo "Service URL: $URL"

      - name: Smoke test member OAuth route exists
        if: ${{ env.VERIFY_PATHS == 'true' }}
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          test -n "$BACKEND_API_KEY" || (echo "Missing BACKEND_API_KEY secret." >&2; exit 1)
          BODY='{"email":"nonexistent-member-validation@example.com","refresh_token":"validation_fake_refresh_token_not_stored","scopes_granted":"https://www.googleapis.com/auth/cloud-platform.read-only","app_key":"google_cloud"}'
          curl -fSs -X POST "$URL/admin/oauth/google/member-connection" \
            -H "content-type: application/json" \
            -H "x-api-key: $BACKEND_API_KEY" \
            --data "$BODY" | tee member-oauth-route-smoke.json
          grep -Eq 'member_not_found|No platform user found' member-oauth-route-smoke.json

      - name: Result
        run: |
          echo "Rebuild complete."
          echo "Revision: ${{ steps.deploy.outputs.revision }}"
          echo "URL: ${{ steps.deploy.outputs.url }}"
