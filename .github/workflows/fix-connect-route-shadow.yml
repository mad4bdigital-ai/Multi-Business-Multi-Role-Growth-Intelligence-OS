name: Fix Connect Route Shadow

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fix-connect-route-shadow.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-connect-route-shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Replace legacy onboarding route
        run: |
          python - <<'PY'
          from pathlib import Path

          Path("http-generic-api/routes/onboardingRoutes.js").write_text('import { Router } from "express";\n\n/**\n * Legacy onboarding routes are intentionally empty.\n *\n * `/connect` is owned by connectRoutes.js. Keeping a second `/connect`\n * handler here can shadow the tenant connector UI when route registration\n * order changes or production revisions drift.\n */\nexport function buildOnboardingRoutes() {\n  return Router();\n}\n', encoding="utf-8")
          Path(".github/workflows/fix-connect-route-shadow.yml").unlink(missing_ok=True)
          PY

          git config user.name "mad4b-platform-bot"
          git config user.email "platform-bot@mad4b.com"
          git add http-generic-api/routes/onboardingRoutes.js .github/workflows/fix-connect-route-shadow.yml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "fix(auth): prevent legacy onboarding route from shadowing connect UI"
          git push
