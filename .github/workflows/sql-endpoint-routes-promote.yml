name: SQL Endpoint Registry Routes Promote

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Google Cloud project ID. Defaults to repository variable GCP_PROJECT_ID."
        required: false
        default: ""
        type: string
      service:
        description: "Cloud Run service"
        required: false
        default: "http-generic-api"
        type: string
      region:
        description: "Cloud Run region"
        required: false
        default: "europe-west1"
        type: string
      revision:
        description: "Revision to promote to 100% traffic"
        required: true
        default: "http-generic-api-00531-rxt"
        type: string
      verify_paths:
        description: "Run production smoke tests after traffic promotion"
        required: false
        default: "true"
        type: string

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ inputs.project_id || vars.GCP_PROJECT_ID }}

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Validate config
        env:
          WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          test -n "$PROJECT_ID" || (echo "Set repository variable GCP_PROJECT_ID or pass project_id input." >&2; exit 1)
          test -n "$WIF_PROVIDER" || (echo "Missing repository variable GCP_WORKLOAD_IDENTITY_PROVIDER." >&2; exit 1)
          test -n "$DEPLOYER_SERVICE_ACCOUNT" || (echo "Missing repository variable GCP_DEPLOYER_SERVICE_ACCOUNT." >&2; exit 1)
          test -n "$REVISION" || (echo "revision input is required." >&2; exit 1)
          echo "Using project: $PROJECT_ID"
          echo "Promoting revision: $REVISION"

      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Promote revision to production traffic
        id: promote
        env:
          SERVICE: ${{ inputs.service }}
          REGION: ${{ inputs.region }}
          REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          gcloud config set project "$PROJECT_ID" --quiet

          gcloud run services update-traffic "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --to-revisions "$REVISION=100" \
            --quiet

          URL="$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format 'value(status.url)')"

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: $URL"
          echo "Promoted revision: $REVISION"

      - name: Smoke source-status on production URL
        if: ${{ inputs.verify_paths == 'true' }}
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          URL: ${{ steps.promote.outputs.url }}
        run: |
          set -euo pipefail
          test -n "$BACKEND_API_KEY" || (echo "Missing BACKEND_API_KEY secret." >&2; exit 1)
          curl -fSS \
            -H "Authorization: Bearer $BACKEND_API_KEY" \
            "$URL/admin/sql/endpoint-registry/source-status" | tee production-source-status.json

      - name: Smoke createGitRef resolver on production URL
        if: ${{ inputs.verify_paths == 'true' }}
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          URL: ${{ steps.promote.outputs.url }}
        run: |
          set -euo pipefail
          curl -fSS \
            -H "Authorization: Bearer $BACKEND_API_KEY" \
            "$URL/admin/sql/endpoint-registry/resolve?parent_action_key=github_git_data&endpoint_key=createGitRef" | tee production-resolve.json

      - name: Result
        run: |
          echo "SQL endpoint registry route revision promoted and production smoke tests completed."
          echo "Production URL: ${{ steps.promote.outputs.url }}"
          echo "Revision: ${{ inputs.revision }}"
