{"name":"Patch GitHub App Auth","on":{"push":{"branches":["main"],"paths":[".github/workflows/patch-github-app-auth.yml"]},"workflow_dispatch":{}},"permissions":{"contents":"write"},"jobs":{"patch":{"runs-on":"ubuntu-latest","steps":[{"uses":"actions/checkout@v4","with":{"persist-credentials":true}},{"name":"Patch GitHub App auth mode","run":"python - <<'PY'\n\nfrom pathlib import Path\n\nroot = Path(\".\")\nauth_injection = root / \"http-generic-api\" / \"authInjection.js\"\nauth_credential = root / \"http-generic-api\" / \"authCredentialResolution.js\"\ngithub_app_auth = root / \"http-generic-api\" / \"githubAppAuth.js\"\nworkflow_path = root / \".github\" / \"workflows\" / \"patch-github-app-auth.yml\"\n\ntext = auth_injection.read_text(encoding=\"utf-8\")\nif 'apiKeyMode === \"github_app\"' not in text:\n    text = text.replace(\n        'if (apiKeyMode === \"google_ads_oauth2\") return \"google_ads_oauth2\";\\n  if (apiKeyMode === \"bearer_token\") return \"bearer_token\";',\n        'if (apiKeyMode === \"google_ads_oauth2\") return \"google_ads_oauth2\";\\n  if (apiKeyMode === \"github_app\") return \"github_app\";\\n  if (apiKeyMode === \"bearer_token\") return \"bearer_token\";',\n    )\n    text = text.replace(\n        'if (apiKeyMode === \"google_ads_oauth2\") return \"google_ads_oauth2\"; if (apiKeyMode === \"bearer_token\") return \"bearer_token\";',\n        'if (apiKeyMode === \"google_ads_oauth2\") return \"google_ads_oauth2\"; if (apiKeyMode === \"github_app\") return \"github_app\"; if (apiKeyMode === \"bearer_token\") return \"bearer_token\";',\n    )\n\ntext = text.replace('contract.mode === \"bearer_token\"', 'contract.mode === \"bearer_token\" || contract.mode === \"github_app\"')\nauth_injection.write_text(text, encoding=\"utf-8\")\n\ntext = auth_credential.read_text(encoding=\"utf-8\")\nif 'githubAppAuth.js' not in text:\n    text = text.replace(\n        'import { getGoogleAccessToken } from \"./googleAuthTokenResolver.js\";',\n        'import { getGoogleAccessToken } from \"./googleAuthTokenResolver.js\";\\nimport { getGitHubAppInstallationToken } from \"./githubAppAuth.js\";',\n    )\n\nif 'mode === \"github_app\"' not in text:\n    marker = '  if (mode === \"bearer_token\") {'\n    block = \"\"\"  if (mode === \"github_app\") {\n    contract.header_name = \"Authorization\";\n    contract.secret = await getGitHubAppInstallationToken({ action });\n    return contract;\n  }\n\n\"\"\"\n    if marker not in text:\n        raise SystemExit(\"bearer_token auth block anchor not found\")\n    text = text.replace(marker, block + marker, 1)\n\nauth_credential.write_text(text, encoding=\"utf-8\")\n\ngithub_app_auth.write_text('import crypto from \"node:crypto\";\\n\\nlet cachedInstallationToken = null;\\n\\nfunction envSecretFromReference(reference = \"\") {\\n  const ref = String(reference || \"\").trim();\\n  const prefix = \"ref:secret:\";\\n  const envKey = ref.startsWith(prefix) ? ref.slice(prefix.length).trim() : ref;\\n  if (!envKey) return \"\";\\n  return String(process.env[envKey] || \"\").trim();\\n}\\n\\nfunction base64Url(input) {\\n  return Buffer.from(input)\\n    .toString(\"base64\")\\n    .replace(/=/g, \"\")\\n    .replace(/\\\\+/g, \"-\")\\n    .replace(/\\\\//g, \"_\");\\n}\\n\\nexport function decodeGitHubAppPrivateKey(value = \"\") {\\n  const raw = String(value || \"\").trim();\\n  if (!raw) return \"\";\\n  if (raw.includes(\"BEGIN\") && raw.includes(\"PRIVATE KEY\")) return raw.replace(/\\\\\\\\n/g, \"\\\\n\");\\n\\n  try {\\n    const decoded = Buffer.from(raw, \"base64\").toString(\"utf8\").trim();\\n    if (decoded.includes(\"BEGIN\") && decoded.includes(\"PRIVATE KEY\")) {\\n      return decoded.replace(/\\\\\\\\n/g, \"\\\\n\");\\n    }\\n  } catch {\\n    // Fall through to raw value.\\n  }\\n\\n  return raw.replace(/\\\\\\\\n/g, \"\\\\n\");\\n}\\n\\nexport function createGitHubAppJwt({ appId, privateKey, nowSeconds = Math.floor(Date.now() / 1000) }) {\\n  const iss = String(appId || \"\").trim();\\n  const key = decodeGitHubAppPrivateKey(privateKey);\\n\\n  if (!iss) {\\n    const err = new Error(\"Missing GitHub App id.\");\\n    err.code = \"github_app_auth_missing_app_id\";\\n    err.status = 500;\\n    throw err;\\n  }\\n\\n  if (!key) {\\n    const err = new Error(\"Missing GitHub App private key.\");\\n    err.code = \"github_app_auth_missing_private_key\";\\n    err.status = 500;\\n    throw err;\\n  }\\n\\n  const header = { alg: \"RS256\", typ: \"JWT\" };\\n  const payload = {\\n    iat: nowSeconds - 60,\\n    exp: nowSeconds + 540,\\n    iss,\\n  };\\n\\n  const signingInput = `${base64Url(JSON.stringify(header))}.${base64Url(JSON.stringify(payload))}`;\\n  const signature = crypto.createSign(\"RSA-SHA256\").update(signingInput).sign(key);\\n  return `${signingInput}.${base64Url(signature)}`;\\n}\\n\\nexport function resolveGitHubAppConfig(action = {}) {\\n  return {\\n    appId:\\n      String(action.github_app_id || \"\").trim() ||\\n      String(process.env.GITHUB_APP_ID || \"\").trim() ||\\n      \"3654304\",\\n    installationId:\\n      String(action.github_app_installation_id || \"\").trim() ||\\n      String(process.env.GITHUB_APP_INSTALLATION_ID || \"\").trim() ||\\n      \"130821054\",\\n    privateKey:\\n      envSecretFromReference(action.secret_store_ref) ||\\n      String(process.env.GITHUB_APP_PRIVATE_KEY_B64 || \"\").trim(),\\n  };\\n}\\n\\nexport async function getGitHubAppInstallationToken({ action = {}, fetchImpl = fetch } = {}) {\\n  const nowMs = Date.now();\\n  if (\\n    cachedInstallationToken?.token &&\\n    cachedInstallationToken?.expiresAtMs &&\\n    cachedInstallationToken.expiresAtMs - 60_000 > nowMs\\n  ) {\\n    return cachedInstallationToken.token;\\n  }\\n\\n  const { appId, installationId, privateKey } = resolveGitHubAppConfig(action);\\n  if (!installationId) {\\n    const err = new Error(\"Missing GitHub App installation id.\");\\n    err.code = \"github_app_auth_missing_installation_id\";\\n    err.status = 500;\\n    throw err;\\n  }\\n\\n  const jwt = createGitHubAppJwt({ appId, privateKey });\\n  const response = await fetchImpl(`https://api.github.com/app/installations/${installationId}/access_tokens`, {\\n    method: \"POST\",\\n    headers: {\\n      Accept: \"application/vnd.github+json\",\\n      Authorization: `Bearer ${jwt}`,\\n      \"X-GitHub-Api-Version\": \"2022-11-28\",\\n      \"User-Agent\": \"mad4b-growth-os-github-app\",\\n    },\\n  });\\n\\n  const body = await response.json().catch(() => ({}));\\n  if (!response.ok || !body?.token) {\\n    const err = new Error(`GitHub App installation token request failed with status ${response.status}.`);\\n    err.code = \"github_app_installation_token_failed\";\\n    err.status = 500;\\n    err.details = { upstream_status: response.status, message: body?.message || \"\" };\\n    throw err;\\n  }\\n\\n  const expiresAtMs = body.expires_at ? Date.parse(body.expires_at) : nowMs + 55 * 60_000;\\n  cachedInstallationToken = {\\n    token: body.token,\\n    expiresAtMs: Number.isFinite(expiresAtMs) ? expiresAtMs : nowMs + 55 * 60_000,\\n  };\\n\\n  return cachedInstallationToken.token;\\n}\\n\\nexport function clearGitHubAppInstallationTokenCache() {\\n  cachedInstallationToken = null;\\n}\\n', encoding=\"utf-8\")\n\nif workflow_path.exists():\n    workflow_path.unlink()\n\nchecks = {\n    auth_injection: ['apiKeyMode === \"github_app\"', 'contract.mode === \"github_app\"'],\n    auth_credential: ['getGitHubAppInstallationToken', 'mode === \"github_app\"'],\n    github_app_auth: ['createGitHubAppJwt', 'getGitHubAppInstallationToken'],\n}\nfor path, required in checks.items():\n    content = path.read_text(encoding=\"utf-8\")\n    for item in required:\n        if item not in content:\n            raise SystemExit(f\"required patch missing from {path}: {item}\")\n\nPY\ngit config user.name mad4b-platform-bot\ngit config user.email platform-bot@mad4b.com\ngit add http-generic-api/authInjection.js http-generic-api/authCredentialResolution.js http-generic-api/githubAppAuth.js .github/workflows/patch-github-app-auth.yml\ngit diff --cached --check\ngit commit -m \"feat(auth): support GitHub App installation token auth\"\ngit push"}]}}}