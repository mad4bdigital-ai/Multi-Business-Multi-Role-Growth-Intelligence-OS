{"name":"Patch Endpoint Registry SQL Source","on":{"push":{"branches":["main"],"paths":[".github/ops/trigger-endpoint-registry-sql-patch.txt"]}},"permissions":{"contents":"write"},"jobs":{"patch":{"runs-on":"ubuntu-latest","steps":[{"uses":"actions/checkout@v4"},{"name":"Patch registrySheets.js with SQL-first registrySource adapter","run":"set -euo pipefail\ncat > http-generic-api/registrySource.js <<'EOF'\nimport { readTable as sqlReadTable } from \"./sqlAdapter.js\";\n\nexport const REGISTRY_SURFACES = Object.freeze({\n  actions: Object.freeze({\n    surfaceKey: \"actions\",\n    sqlTableName: \"Actions Registry\",\n    legacySheetEnv: \"ACTIONS_REGISTRY_SHEET\",\n    keyFields: Object.freeze([\"action_key\"])\n  }),\n  endpoints: Object.freeze({\n    surfaceKey: \"endpoints\",\n    sqlTableName: \"API Actions Endpoint Registry\",\n    legacySheetEnv: \"ENDPOINT_REGISTRY_SHEET\",\n    keyFields: Object.freeze([\"parent_action_key\", \"endpoint_key\"])\n  }),\n  executionPolicies: Object.freeze({\n    surfaceKey: \"execution_policies\",\n    sqlTableName: \"Execution Policy Registry\",\n    legacySheetEnv: \"EXECUTION_POLICY_SHEET\",\n    keyFields: Object.freeze([\"policy_group\", \"policy_key\"])\n  })\n});\n\nfunction normalizeSource(value, fallback = \"sql\") {\n  return String(value || fallback).trim().toLowerCase();\n}\n\nfunction envFlag(name, fallback = \"false\") {\n  return String(process.env[name] ?? fallback).trim().toLowerCase() === \"true\";\n}\n\nexport function shouldReadRegistrySurfaceFromSql(surfaceKey, env = process.env) {\n  const surface = REGISTRY_SURFACES[surfaceKey];\n  if (!surface) throw new Error(`Unknown registry surface: ${surfaceKey}`);\n\n  const globalSource = normalizeSource(env.REGISTRY_PRIMARY_SOURCE || env.DATA_SOURCE, \"sql\");\n  const surfaceEnvName = `${String(surfaceKey).toUpperCase()}_REGISTRY_SOURCE`;\n  const surfaceSource = normalizeSource(env[surfaceEnvName] || globalSource, \"sql\");\n  const legacyFlagName = `LEGACY_SHEET_${String(surfaceKey).toUpperCase()}_REGISTRY_ENABLED`;\n  const legacyEnabled = envFlag(legacyFlagName, \"false\");\n\n  return surfaceSource !== \"sheets\" || !legacyEnabled;\n}\n\nexport async function readSqlRegistrySurface(surfaceKey) {\n  const surface = REGISTRY_SURFACES[surfaceKey];\n  if (!surface) throw new Error(`Unknown registry surface: ${surfaceKey}`);\n  const rows = await sqlReadTable(surface.sqlTableName);\n  return Array.isArray(rows) ? rows : [];\n}\n\nexport function filterRowsByKeyFields(rows = [], surfaceKey) {\n  const surface = REGISTRY_SURFACES[surfaceKey];\n  if (!surface) throw new Error(`Unknown registry surface: ${surfaceKey}`);\n  return rows.filter(row =>\n    surface.keyFields.some(field => String(row?.[field] ?? \"\").trim())\n  );\n}\nEOF\n\nnode <<'NODE'\nconst fs = require(\"fs\");\nconst file = \"http-generic-api/registrySheets.js\";\nlet src = fs.readFileSync(file, \"utf8\");\n\nif (!src.includes('from \"./registrySource.js\"')) {\n  const importNeedle = 'import { readTable as sqlReadTable } from \"./sqlAdapter.js\";';\n  const importPatch = [\n    importNeedle,\n    'import {',\n    '  filterRowsByKeyFields,',\n    '  readSqlRegistrySurface,',\n    '  shouldReadRegistrySurfaceFromSql',\n    '} from \"./registrySource.js\";'\n  ].join(\"\\n\");\n  if (!src.includes(importNeedle)) throw new Error(\"sqlAdapter import not found\");\n  src = src.replace(importNeedle, importPatch);\n}\n\nconst fnStart = src.indexOf(\"export async function loadEndpointRegistry\");\nif (fnStart === -1) throw new Error(\"loadEndpointRegistry function not found\");\n\nconst branchNeedle = 'shouldReadRegistrySurfaceFromSql(\"endpoints\")';\nif (!src.includes(branchNeedle)) {\n  const readNeedle = \"const values = await readRegistryTable\";\n  const readStart = src.indexOf(readNeedle, fnStart);\n  if (readStart === -1) throw new Error(\"Could not locate first readRegistryTable inside loadEndpointRegistry\");\n  const nextFnStart = src.indexOf(\"\\nexport \", fnStart + 1);\n  if (nextFnStart !== -1 && readStart > nextFnStart) throw new Error(\"Located readRegistryTable outside loadEndpointRegistry\");\n\n  const sqlBranch = [\n    '  if (shouldReadRegistrySurfaceFromSql(\"endpoints\")) {',\n    '    const rows = await readSqlRegistrySurface(\"endpoints\");',\n    '    return filterRowsByKeyFields(rows, \"endpoints\");',\n    '  }',\n    '',\n    ''\n  ].join(\"\\n\");\n  src = src.slice(0, readStart) + sqlBranch + src.slice(readStart);\n}\n\nfs.writeFileSync(file, src);\nNODE\n\nnode --check http-generic-api/registrySource.js\nnode --check http-generic-api/registrySheets.js\n\ngrep -n \"registrySource\" http-generic-api/registrySheets.js\ngrep -n 'shouldReadRegistrySurfaceFromSql(\"endpoints\")' http-generic-api/registrySheets.js\ngrep -n 'sqlTableName: \"API Actions Endpoint Registry\"' http-generic-api/registrySource.js\n\nif git diff --quiet; then\n  echo \"No changes to commit.\"\n  exit 0\nfi\n\ngit config user.name \"mad4bdigital-ai\"\ngit config user.email \"mad4b.digital@gmail.com\"\ngit add http-generic-api/registrySource.js http-generic-api/registrySheets.js\ngit commit -m \"fix: read endpoint registry from SQL source adapter\"\ngit push\n"}]}}}