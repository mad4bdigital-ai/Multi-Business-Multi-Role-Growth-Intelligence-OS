name: Patch GitHub App PEM detection

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-github-app-pem-detection.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
      - name: Patch PEM detection
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("http-generic-api/githubAppAuth.js")
          text = path.read_text(encoding="utf-8")
          old = 'return value.includes("-----BEGIN") && value.includes("PRIVATE KEY-----");'
          new = 'return value.trim().startsWith("-----BEGIN") && value.includes("PRIVATE KEY-----");'
          if old not in text and new not in text:
              raise SystemExit("PEM detection anchor not found")
          if old in text:
              text = text.replace(old, new, 1)
          workflow = Path(".github/workflows/patch-github-app-pem-detection.yml")
          if workflow.exists():
              workflow.unlink()
          path.write_text(text, encoding="utf-8")
          PY
          node --check http-generic-api/githubAppAuth.js
          cd http-generic-api
          node test-github-app-auth-decoders.mjs
          cd ..
          git config user.name "mad4b-platform-bot"
          git config user.email "platform-bot@mad4b.com"
          git add http-generic-api/githubAppAuth.js .github/workflows/patch-github-app-pem-detection.yml
          git diff --cached --check
          git commit -m "fix(auth): avoid treating JSON-wrapped keys as PEM"
          git push
