name: Patch GitHub App env assignment stripper

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-github-app-env-stripper.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
      - name: Patch GitHub App env assignment stripper
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("http-generic-api/githubAppAuth.js")
          text = path.read_text(encoding="utf-8")
          old = 'const match = text.match(/^[A-Za-z_][A-Za-z0-9_]*=(.*)$/s);'
          new = 'const match = text.match(/^(?:export\\\\s+)?(?:GITHUB_APP_PRIVATE_KEY_B64|GITHUB_APP_PRIVATE_KEY)\\\\s*=\\\\s*([\\\\s\\\\S]*)$/);'
          if old not in text and new not in text:
              raise SystemExit("assignment stripper anchor not found")
          if old in text:
              text = text.replace(old, new, 1)
          workflow = Path(".github/workflows/patch-github-app-env-stripper.yml")
          if workflow.exists():
              workflow.unlink()
          path.write_text(text, encoding="utf-8")
          PY
          git config user.name "mad4b-platform-bot"
          git config user.email "platform-bot@mad4b.com"
          git add http-generic-api/githubAppAuth.js .github/workflows/patch-github-app-env-stripper.yml
          git diff --cached --check
          git commit -m "fix(auth): avoid stripping equals from base64 GitHub App keys"
          git push
